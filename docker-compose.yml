version: '3.8'

services:
    sftp:
        image: atmoz/sftp
        ports:
            - '2222:22'
        command: testuser:testpass:1000:100:upload
        volumes:
            - sftp-data:/home/testuser/upload

    ftp:
        image: delfer/alpine-ftp-server
        ports:
            - '21:21'
            - '21000-21010:21000-21010'
        environment:
            USERS: 'testuser|testpass|/home/testuser|1000'
            ADDRESS: localhost

    minio:
        image: minio/minio
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        command: server /data --console-address ':9001'
        volumes:
            - minio-data:/data

    webdav:
        image: bytemark/webdav
        ports:
            - '8080:80'
        environment:
            AUTH_TYPE: Basic
            USERNAME: testuser
            PASSWORD: testpass
        volumes:
            - webdav-data:/var/lib/dav

volumes:
    sftp-data:
    minio-data:
    webdav-data:
